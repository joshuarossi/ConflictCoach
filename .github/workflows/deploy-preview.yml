name: Deploy preview

on:
  pull_request:
    types: [opened, synchronize, reopened]

concurrency:
  group: deploy-preview-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    outputs:
      preview-url: ${{ steps.cf.outputs.deployment-url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm install --prefer-offline --no-audit --no-fund

      - name: Compute preview branch name
        id: branch
        env:
          HEAD_REF: ${{ github.head_ref }}
        run: |
          # Cloudflare Pages branch names: lowercase, alphanumeric + hyphens, max 28 chars
          slug=$(printf '%s' "$HEAD_REF" | tr '[:upper:]' '[:lower:]' | sed 's/[^a-z0-9-]/-/g' | cut -c1-28 | sed 's/-$//')
          echo "slug=$slug" >> "$GITHUB_OUTPUT"

      # Deploy Convex first so the preview URL is available as VITE_CONVEX_URL
      # for the build step. Don't swallow errors here — if Convex preview
      # fails, the frontend would build pointing at a stale or default
      # backend, producing a broken preview deploy. Better to fail loudly.
      - name: Deploy Convex (preview)
        id: convex
        env:
          CONVEX_DEPLOY_KEY: ${{ secrets.CONVEX_DEPLOY_KEY_PREVIEW }}
        run: |
          set -euo pipefail
          # The convex CLI prints the preview URL on success and writes it
          # to .env.local as CONVEX_URL=. We capture it for the build step.
          npx convex deploy --preview-create "${{ steps.branch.outputs.slug }}" --cmd-url-env-var-name VITE_CONVEX_URL --cmd "echo \"convex preview URL written to env\""
          # Pull VITE_CONVEX_URL out of .env.local so subsequent steps can use it.
          if [ -f .env.local ]; then
            convex_url=$(grep '^VITE_CONVEX_URL=' .env.local | cut -d= -f2- | tr -d '"' | tr -d "'")
            if [ -n "$convex_url" ]; then
              echo "convex_url=$convex_url" >> "$GITHUB_OUTPUT"
            fi
          fi

      - name: Build frontend with preview Convex URL
        env:
          VITE_CONVEX_URL: ${{ steps.convex.outputs.convex_url }}
        run: |
          set -euo pipefail
          if [ -z "${VITE_CONVEX_URL:-}" ]; then
            echo "::error::Convex preview deploy did not produce a URL. Check CONVEX_DEPLOY_KEY_PREVIEW secret." >&2
            exit 1
          fi
          npm run build

      - name: Deploy to Cloudflare Pages (preview)
        id: cf
        uses: cloudflare/wrangler-action@v3
        with:
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          command: pages deploy dist --project-name=${{ vars.CLOUDFLARE_PROJECT_NAME }} --branch=${{ steps.branch.outputs.slug }} --commit-dirty=true

      - name: Comment preview URL on PR
        uses: actions/github-script@v7
        with:
          script: |
            const url = `${{ steps.cf.outputs.deployment-url }}`;
            const marker = '<!-- preview-deploy-comment -->';
            const body = `${marker}\nPreview deployed: ${url}`;
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.body && c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

  e2e:
    needs: deploy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm install --prefer-offline --no-audit --no-fund

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run Playwright tests against preview
        env:
          E2E_BASE_URL: ${{ needs.deploy.outputs.preview-url }}
        run: npm run test:e2e

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
